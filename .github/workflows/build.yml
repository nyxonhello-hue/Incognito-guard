name: Build IncognitoGuard

on:
  push:
    branches: [master, main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller pillow
      - run: pyinstaller --onefile --windowed --add-data "config.json;." --name IncognitoGuard guard.py
      - name: Package
        run: |
          mkdir release
          copy dist\IncognitoGuard.exe release\
          copy config.json release\
          copy install.ps1 release\
      - uses: actions/upload-artifact@v4
        with:
          name: IncognitoGuard-Windows
          path: release\

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller && sudo apt-get install -y python3-tk
      - run: pyinstaller --onefile --windowed --add-data "config.json:." --name IncognitoGuard guard.py
      - name: Package
        run: |
          mkdir release
          cp dist/IncognitoGuard release/
          cp config.json release/
          cp install.sh release/
      - uses: actions/upload-artifact@v4
        with:
          name: IncognitoGuard-Linux
          path: release/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyinstaller
      - run: pyinstaller --onefile --windowed --add-data "config.json:." --name IncognitoGuard guard.py
      - name: Package
        run: |
          mkdir release
          cp dist/IncognitoGuard release/
          cp config.json release/
          cp install.sh release/
      - uses: actions/upload-artifact@v4
        with:
          name: IncognitoGuard-macOS
          path: release/
